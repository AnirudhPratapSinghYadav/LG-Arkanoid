<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arkanoid LG Controller</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #050510 0%, #1a0b2e 100%);
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;  }
        .top-right {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 15px; }
        .icon-btn {
            background: rgba(255, 0, 255, 0.1);
            border: 2px solid #ff00ff;
            color: #ff00ff;
            font-size: 24px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.5);
            transition: all 0.2s;}

        .icon-btn:active {
            background: rgba(255, 0, 255, 0.4);
            box-shadow: 0 0 20px rgba(255, 0, 255, 1); }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 1000; }
        .modal-content {
            background: rgba(10, 10, 30, 0.9);
            padding: 30px;
            border-radius: 15px;
            border: 2px solid #00ffff;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.3);
            width: 80%;
            max-width: 400px;
            text-align: center;   }

        h1, h2, h3 {
            color: #00ffff;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.7);
            letter-spacing: 2px; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #ff00ff;
            color: #fff;
            font-size: 18px;
            font-family: 'Orbitron', sans-serif;
            box-sizing: border-box;
            border-radius: 5px;
            text-align: center; }
        input:focus {
            outline: none;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.6);  }
        button.action-btn {
            background: linear-gradient(90deg, #00ffff, #0088ff);
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 20px;
            font-weight: bold;
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 15px;
            width: 100%;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
            transition: all 0.2s;  }

        button.action-btn:active {
            transform: scale(0.95);
            box-shadow: 0 0 25px rgba(0, 255, 255, 1); }

        .hidden { display: none !important; }
        #joinArea {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 90%;
            max-width: 400px;    }
        #gameArea {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;}
        .touch-pad {
            width: 90%;
            height: 60vh;
            background: rgba(0, 255, 255, 0.05);
            border: 2px solid #00ffff;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: rgba(0, 255, 255, 0.5);
            margin-top: 20px;
            box-shadow: inset 0 0 30px rgba(0, 255, 255, 0.1);  }
    </style>
</head>
<body>

    <div class="top-right">
        <button class="icon-btn" onclick="document.getElementById('settingsModal').style.display='flex'">⚙️</button>
        <button class="icon-btn" onclick="document.getElementById('aboutModal').style.display='flex'">?</button>
    </div>
    <div id="joinArea">
        <h1> Arkanoid AI by LG</h1>
        <p>Enter Session Token displa7ed on the Rig</p>
        <input type="text" id="tokenInput" placeholder="Token (e.g. abc123def)" />
        <button class="action-btn" onclick="joinGame()">Join Game</button>
    </div>
    <div id="gameArea" class="hidden">
        <h2 id="playerStatus">Connected</h2>
        <div class="touch-pad" id="touchPad">
            DRAG TO MOVE PADDLE
        </div>
    </div>
    <div id="aboutModal" class="modal">
        <div class="modal-content">
            <h3>Author</h3>
            <p>Anirudh Pratap Singh Yadav</p>
            <p>for the gemini summer of code by liquid galaxy</p>
            <button class="action-btn" onclick="document.getElementById('aboutModal').style.display='none'">Close</button>
        </div>
    </div>

    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <h3>Liquid Galaxy Settings</h3>
            <input type="number" id="numScreens" placeholder="Number of Rigs (3 or 5)" value="5">
            <input type="text" id="masterIp" placeholder="Master IP (lg1)">
            <input type="text" id="username" placeholder="SSH Username" value="lg">
            <input type="password" id="password" placeholder="SSH Password">
            <button class="action-btn" onclick="deployToRig()">Deploy to Liquid Galaxy</button>
            <button class="action-btn" style="background:#555;color:#fff;" onclick="document.getElementById('settingsModal').style.display='none'">Close</button>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.8.0/socket.io.min.js"></script>
    <script>
        let socket;
        let isConnected = false;
        function deployToRig() {
            const numScreens = document.getElementById('numScreens').value;
            const masterIp = document.getElementById('masterIp').value;
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            fetch('/api/deploy_lg', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ numScreens, masterIp, username, password })})
            .then(res => res.json())
            .then(data => {
                alert('Deployment triggered for ' + data.numScreens + ' screens!');
                document.getElementById('settingsModal').style.display = 'none'; })
            .catch(err => alert('Error deploying: ' + err)); }
        function joinGame() {
            const token = document.getElementById('tokenInput').value.trim();
            if (!token) return alert('Please enter a token');

            socket = io(window.location.origin, {
                query: { controller: 'true' },
                transports: ['websocket', 'polling'] });
            socket.on('connect', () => {
                const nonce = Math.random().toString(36).substring(2, 15);
                socket.emit('player_join', { token, timestamp: Date.now(), nonce });
            });
            socket.on('join_result', (data) => {
                if (data.success) {
                    isConnected = true;
                    document.getElementById('joinArea').classList.add('hidden');
                    document.getElementById('gameArea').classList.remove('hidden');
                    document.getElementById('playerStatus').innerText = 'Player ' + data.playerNumber;
                    setupTouchControls();
                    
                    // Initialize speech synthesis on user interaction
                    if ('speechSynthesis' in window) {
                        window.speechSynthesis.getVoices();
                    }
                } else {
                    alert('Join failed: ' + data.message);
                    socket.disconnect();
                }
            });

            socket.on('commentary', (data) => {
                if (data && data.text && 'speechSynthesis' in window) {
                    const utterance = new SpeechSynthesisUtterance(data.text);
                    utterance.rate = 1.1;
                    window.speechSynthesis.speak(utterance);
                }
            });
        }

        function setupTouchControls() {
            const pad = document.getElementById('touchPad');
            let lastX = 0;

            pad.addEventListener('touchstart', (e) => {
                lastX = e.touches[0].clientX;
            });

            pad.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (!isConnected) return;
                const currentX = e.touches[0].clientX;
                const deltaX = currentX - lastX;
                const rigDeltaX = deltaX * 10; 
                if (Math.abs(rigDeltaX) > 0) {
                    const nonce = Math.random().toString(36).substring(2, 15);
                    socket.emit('paddle_move', { 
                        deltaX: rigDeltaX, 
                        timestamp: Date.now(), 
                        nonce 
                    });}
                lastX = currentX;});
        }
    </script>
</body>
</html>
